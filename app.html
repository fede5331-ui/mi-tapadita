<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Tapadita</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-body">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-logo" onclick="abrirMenu()">
  <span class="logo-mi-header">Mi</span><span class="logo-tapadita">Tapadita 🍀</span>
    </div>
    <div class="header-iconos">
      <button class="icono-btn" onclick="toggleEditar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Editar
      </button>
      <button class="icono-btn" onclick="capturar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="12" cy="12" r="4"/>
          <path d="M3 9h2M3 15h2M19 9h2M19 15h2M9 3v2M15 3v2M9 19v2M15 19v2"/>
        </svg>
        Captura
      </button>
    </div>
  </header>

  <!-- CARTON -->
  <div class="carton-container" id="carton-container">
    <!-- Se genera dinámicamente -->
  </div>

  <!-- MENU -->
  <div class="menu-overlay" id="menu-overlay" onclick="cerrarMenu(event)">
    <div class="menu-sheet">
      <p class="menu-titulo">Mi Tapadita</p>
      <button class="menu-btn menu-btn-sortear" onclick="iniciarSorteo()">Sortear</button>
      <button class="menu-btn menu-btn-nuevo" onclick="abrirNuevo()">Nuevo cartón</button>
      <button class="menu-btn menu-btn-historial" onclick="abrirHistorial()">Historial</button>
      <button class="menu-btn menu-btn-soporte" onclick="abrirSoporte()">Soporte</button>
      <button class="menu-btn menu-btn-cerrar" onclick="cerrarSesion()">Cerrar sesión</button>
      <button class="menu-btn menu-btn-cerrar" onclick="cerrarMenu()">Cancelar</button>
    </div>
  </div>

  <!-- SORTEO -->
  <div class="sorteo-overlay" id="sorteo-overlay">
    <div class="sorteo-card">
      <p class="sorteo-titulo">Sorteando...</p>
      <div class="sorteo-numero" id="sorteo-numero">?</div>
      <div class="sorteo-nombre" id="sorteo-nombre"></div>
      <button class="sorteo-cerrar" id="sorteo-cerrar" onclick="cerrarSorteo()">Cerrar</button>
    </div>
  </div>

  <!-- CONFIRMAR REVELADO -->
  <div class="confirmar-overlay" id="confirmar-overlay">
    <div class="confirmar-card">
      <p class="confirmar-titulo">🍀 Revelar Ganadores</p>
      <p class="confirmar-texto">¿Confirmás que querés raspar y descubrir los ganadores ahora?</p>
      <button class="confirmar-btn-aceptar" onclick="confirmarRevelado()">Confirmar</button>
      <button class="confirmar-btn-cancelar" onclick="cerrarConfirmar()">Cancelar</button>
    </div>
  </div>

  <!-- SOPORTE -->
  <div class="soporte-overlay" id="soporte-overlay" onclick="cerrarSoporte(event)">
    <div class="soporte-card">
      <p class="soporte-titulo">¿Necesitas Ayuda?</p>  
      <p class="soporte-texto">Contactanos por Whatsapp por cualquier duda o inconveniente que tengas con la app.</p>
      <button class="soporte-btn-whatsapp" onclick="contactarSoporte()">Escribir por WhatsApp</button>
      <button class="soporte-btn-cerrar" onclick="cerrarSoporte()">Cerrar</button>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="historial-overlay" id="historial-overlay" onclick="cerrarHistorial(event)">
    <div class="historial-sheet">
      <p class="historial-titulo">Historial de cartones</p>
      <div id="historial-lista"></div>
      <button class="historial-cerrar" onclick="cerrarHistorial()">Cerrar</button>
    </div>
  </div>

  <!-- NUEVO CARTON -->
  <div class="nuevo-overlay" id="nuevo-overlay" onclick="cerrarNuevo(event)">
    <div class="nuevo-card">
      <p class="nuevo-titulo">¿Cuántos números?</p>
      <div id="paso-tamaño">

  <div class="nuevo-opciones">
    <button class="nuevo-opcion" onclick="elegirTamaño(25)">25 números</button>
    <button class="nuevo-opcion" onclick="elegirTamaño(50)">50 números</button>
    <button class="nuevo-opcion" onclick="elegirTamaño(100)">100 números</button>
  </div>
</div>

<div id="paso-premios" style="display:none">
  <p class="nuevo-titulo">¿Cuántos Premios?</p>
  <div class="nuevo-opciones">
    <button class="nuevo-opcion" onclick="crearCarton(1)">1 Premio</button>
    <button class="nuevo-opcion" onclick="crearCarton(2)">2 Premios</button>
    <button class="nuevo-opcion" onclick="crearCarton(3)">3 Premios</button>
  </div>
</div>
      <button class="nuevo-cerrar" onclick="cerrarNuevo()">Cancelar</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>

</body>
</html>
